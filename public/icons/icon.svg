<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="keyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#30363D;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#21262D;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1F6FEB;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="512" height="512" rx="96" fill="url(#bgGrad)" />

    <!-- Keyboard Base -->
    <rect x="56" y="180" width="400" height="200" rx="16" fill="url(#keyGrad)" stroke="#484F58"
        stroke-width="2" />

    <!-- Key Row 1 -->
    <rect x="76" y="200" width="36" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="120" y="200" width="36" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="164" y="200" width="36" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="208" y="200" width="36" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="252" y="200" width="36" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="296" y="200" width="36" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="340" y="200" width="36" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="384" y="200" width="52" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />

    <!-- Key Row 2 (Home Row - highlighted) -->
    <rect x="76" y="244" width="44" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="128" y="244" width="36" height="36" rx="6" fill="url(#accentGrad)" stroke="#58A6FF"
        stroke-width="1" />
    <text x="146" y="270" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
        fill="white" text-anchor="middle">A</text>
    <rect x="172" y="244" width="36" height="36" rx="6" fill="url(#accentGrad)" stroke="#58A6FF"
        stroke-width="1" />
    <text x="190" y="270" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
        fill="white" text-anchor="middle">S</text>
    <rect x="216" y="244" width="36" height="36" rx="6" fill="url(#accentGrad)" stroke="#58A6FF"
        stroke-width="1" />
    <text x="234" y="270" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
        fill="white" text-anchor="middle">D</text>
    <rect x="260" y="244" width="36" height="36" rx="6" fill="url(#accentGrad)" stroke="#58A6FF"
        stroke-width="1" />
    <text x="278" y="270" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
        fill="white" text-anchor="middle">F</text>
    <rect x="304" y="244" width="36" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="348" y="244" width="36" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="392" y="244" width="44" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />

    <!-- Key Row 3 -->
    <rect x="76" y="288" width="52" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="136" y="288" width="36" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="180" y="288" width="36" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="224" y="288" width="36" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="268" y="288" width="36" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="312" y="288" width="36" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />
    <rect x="356" y="288" width="80" height="36" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />

    <!-- Spacebar -->
    <rect x="136" y="332" width="240" height="32" rx="6" fill="#21262D" stroke="#484F58"
        stroke-width="1" />

    <!-- Speed indicator / cursor -->
    <circle cx="256" y="116" r="40" fill="url(#accentGrad)" opacity="0.9" />
    <text x="256" y="124" font-family="Arial, sans-serif" font-size="24" font-weight="bold"
        fill="white" text-anchor="middle">WPM</text>

    <!-- Decorative typing indicator dots -->
    <circle cx="180" y="432" r="8" fill="#58A6FF" opacity="0.8" />
    <circle cx="216" y="432" r="8" fill="#58A6FF" opacity="0.6" />
    <circle cx="252" y="432" r="8" fill="#58A6FF" opacity="0.4" />
    <circle cx="288" y="432" r="8" fill="#58A6FF" opacity="0.6" />
    <circle cx="324" y="432" r="8" fill="#58A6FF" opacity="0.8" />
</svg>